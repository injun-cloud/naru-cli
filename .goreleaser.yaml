version: 2

project_name: naru

before:
  hooks:
    - go mod tidy

builds:
  - id: naru
    main: ./cmd/naru
    binary: naru
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  # No version in the name so /releases/latest/download/naru_<os>_<arch>.<ext>
  # is a stable URL the install script can hit.
  - id: naru
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: injun-cloud
    name: naru-cli
